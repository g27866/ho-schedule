<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="Ot0t7-RpAdCwXEGKYRhQB5kBJWl5rKXW9sLLeVQzR7Q" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HO幫手 | 專業排班管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        headline: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                        label: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; height: 100vh; height: 100dvh; overflow: hidden; margin: 0; }
        #app { height: 100%; width: 100%; }
        /* 為了解決移動端滾動流暢度 */
        .webkit-overflow-scrolling { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-[#F7F9FB] text-[#191C1E]">
    <div id="app"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.11.11/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        const { useState, useEffect, createElement: h } = React;
        
        window.addEventListener('load', () => {
            const motion = window.Motion ? window.Motion.motion : null;
            const AnimatePresence = window.Motion ? window.Motion.AnimatePresence : null;
            const LIFF_URL = 'https://liff.line.me/2004245781-W05x423L';

            if (!motion || !AnimatePresence) {
                document.getElementById('app').innerHTML = '<div style="padding: 2rem; text-align: center;">載入失敗，請檢查網路連線。</div>';
                return;
            }

            function App() {
                const [showSplash, setShowSplash] = useState(true);
                const [hasReadToBottom, setHasReadToBottom] = useState(false);

                useEffect(() => {
                    const timer = setTimeout(() => setShowSplash(false), 2500);
                    return () => clearTimeout(timer);
                }, []);

                useEffect(() => {
                    if (!showSplash && window.lucide) {
                        try { window.lucide.createIcons(); } catch(e) {}
                    }
                }, [showSplash]);

                const handleScroll = (e) => {
                    const { scrollTop, scrollHeight, clientHeight } = e.currentTarget;
                    // 當滾動超過 90% 時即視為已閱讀
                    if (scrollTop + clientHeight >= scrollHeight - 30) {
                        setHasReadToBottom(true);
                    }
                };

                return h(AnimatePresence, { mode: 'wait' },
                    showSplash 
                    ? h(motion.div, { key: "splash", exit: { opacity: 0, scale: 1.1 }, transition: { duration: 0.5 } },
                        h(SplashScreen)
                      )
                    : h(motion.main, { 
                        key: "landing", 
                        initial: { opacity: 0 }, 
                        animate: { opacity: 1 }, 
                        className: "relative h-screen w-full flex flex-col bg-[#F7F9FB] text-[#191C1E] overflow-hidden" 
                      },
                        h('div', { className: "absolute top-[-5%] right-[-5%] w-72 h-72 bg-[#FFCE00]/10 rounded-full blur-[100px] pointer-events-none" }),
                        h('div', { className: "absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-[#006C49]/5 rounded-full blur-[100px] pointer-events-none" }),
                        
                        h('header', { className: "shrink-0 p-6 flex flex-col items-center gap-3" },
                            h(motion.div, { 
                                initial: { y: -20, opacity: 0 }, 
                                animate: { y: 0, opacity: 1 },
                                className: "w-14 h-14 rounded-2xl bg-white shadow-md flex items-center justify-center border border-white"
                            }, 
                                h('img', { 
                                    src: "https://www.hohoho.com.tw/EDM/project/images/hoban_Schedule_logo.svg",
                                    className: "w-9 h-9 object-contain"
                                })
                            ),
                            h('div', { className: "text-center" },
                                h('h1', { className: "text-xl font-extrabold text-[#191C1E] tracking-tight" }, "HO幫手"),
                                h('p', { className: "text-[9px] uppercase tracking-[0.3em] text-[#4E4632]/60" }, "Scheduler Ecosystem")
                            )
                        ),

                        h('div', { className: "flex-1 px-5 pb-24 min-h-0 relative overflow-hidden" },
                            h(motion.div, {
                                initial: { y: 30, opacity: 0 },
                                animate: { y: 0, opacity: 1 },
                                transition: { delay: 0.2 },
                                className: "h-full bg-white/60 backdrop-blur-xl rounded-[32px] border border-white shadow-xl flex flex-col overflow-hidden"
                            },
                                h('div', { className: "px-6 py-5 border-b border-slate-100 flex items-center justify-between shrink-0" },
                                    h('div', { className: "flex items-center gap-2.5" },
                                        h('div', { className: "p-2 bg-[#FFCE00]/10 rounded-xl" }, 
                                            h('i', { 'data-lucide': "shield-check", className: "w-4 h-4 text-[#735C00]" })
                                        ),
                                        h('span', { className: "font-bold text-slate-900 text-sm" }, "服務條款與隱私權")
                                    ),
                                    !hasReadToBottom && h(motion.div, {
                                        animate: { y: [0, 4, 0] },
                                        transition: { repeat: Infinity, duration: 1.5 },
                                        className: "flex items-center gap-1 text-[9px] font-bold text-[#735C00] uppercase tracking-tighter"
                                    }, 
                                        h('i', { 'data-lucide': "chevron-down", className: "w-3 h-3" }),
                                        "往下滑動"
                                    )
                                ),
                                h('div', { 
                                    className: "flex-1 overflow-y-auto p-6 space-y-8 scroll-smooth webkit-overflow-scrolling",
                                    onScroll: handleScroll
                                },
                                    h(PrivacyPolicyContent),
                                    h('div', { className: "pt-8 pb-4 text-center" },
                                        h('div', { 
                                            className: "inline-flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-500 " + 
                                                   (hasReadToBottom ? "bg-green-50 text-green-600" : "bg-slate-50 text-slate-400")
                                        },
                                            hasReadToBottom 
                                            ? h('i', { 'data-lucide': "check-circle", className: "w-4 h-4" })
                                            : h('div', { className: "w-4 h-4 rounded-full border-2 border-slate-200" }),
                                            h('span', { className: "text-xs font-bold" }, "我已閱讀至條款末端")
                                        )
                                    )
                                )
                            )
                        ),

                        h('footer', { className: "fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-[#F7F9FB] to-transparent z-20" },
                            h(motion.button, {
                                whileTap: { scale: 0.96 },
                                onClick: () => { window.location.href = LIFF_URL; },
                                disabled: !hasReadToBottom,
                                className: "w-full py-5 rounded-[24px] font-bold text-lg shadow-xl transition-all duration-300 flex items-center justify-center gap-3 " + 
                                           (hasReadToBottom 
                                             ? "bg-[#FFCE00] text-[#735C00] shadow-[#FFCE00]/20 font-black" 
                                             : "bg-slate-200 text-slate-400 cursor-not-allowed")
                            }, 
                                h('span', null, "同意並開始使用"),
                                h(motion.div, { 
                                    animate: hasReadToBottom ? { x: [0, 5, 0] } : {},
                                    transition: { repeat: Infinity, duration: 1 }
                                }, "→")
                            ),
                            h('div', { className: "flex flex-col items-center gap-2 mt-4" },
                                h('a', { href: "privacy.html", className: "text-[10px] font-bold text-[#735C00] hover:underline decoration-2 underline-offset-4" }, "隱私權政策 Privacy Policy"),
                                h('p', { className: "text-center text-[10px] font-medium text-slate-400 tracking-widest uppercase" }, "Version 1.2.1 • © 2026 HOBAN CORP")
                            )
                        )
                    )
                );
            }

            function SplashScreen() {
                return h('main', { className: "relative h-screen w-full flex flex-col items-center justify-center overflow-hidden bg-[#F7F9FB] text-[#191C1E]" },
                    h('div', { className: "absolute top-[-10%] right-[-10%] w-64 h-64 bg-[#FFCE00]/20 rounded-full blur-[80px] opacity-40" }),
                    h('div', { className: "absolute bottom-[-5%] left-[-15%] w-80 h-80 bg-[#006C49]/10 rounded-full blur-[80px] opacity-40" }),
                    h('div', { className: "z-10 flex flex-col items-center gap-8" },
                        h(motion.div, {
                            initial: { scale: 0.8, opacity: 0 },
                            animate: { scale: 1, opacity: 1 },
                            transition: { duration: 0.8, ease: [0.34, 1.56, 0.64, 1] },
                            className: "relative group"
                        },
                            h('div', { className: "absolute inset-0 bg-[#FFCE00] blur-2xl opacity-20 scale-110" }),
                            h('div', { className: "relative w-28 h-28 md:w-32 md:h-32 rounded-[2rem] bg-white flex items-center justify-center shadow-[0_20px_40px_-12px_rgba(25,28,30,0.08)]" },
                                h('img', { 
                                    src: "https://www.hohoho.com.tw/EDM/project/images/hoban_Schedule_logo.svg",
                                    className: "w-16 h-16 md:w-20 md:h-20 object-contain"
                                })
                            )
                        ),
                        h('div', { className: "text-center space-y-2" },
                            h('h1', { className: "text-3xl md:text-5xl font-extrabold tracking-tighter text-[#191C1E] flex items-center gap-1" }, 
                                "HO幫手", h('span', { className: "w-2 h-2 rounded-full bg-[#FFCE00] mb-2" })
                            ),
                            h('p', { className: "text-sm uppercase tracking-[0.2em] text-[#4E4632] font-medium" }, "HO Scheduler")
                        ),
                        h('div', { className: "mt-12 flex flex-col items-center gap-4 text-xs font-medium text-[#4E4632]/60" },
                            h('div', { className: "w-48 h-1 bg-[#E0E3E5] rounded-full overflow-hidden" },
                                h(motion.div, {
                                    initial: { x: '-100%' },
                                    animate: { x: '100%' },
                                    transition: { repeat: Infinity, duration: 1.5, ease: "linear" },
                                    className: "h-full bg-[#FFCE00] w-1/3 rounded-full"
                                })
                            ),
                            h('span', null, "系統載入中")
                        ),
                        h('div', { className: "absolute bottom-10 left-0 right-0 flex justify-center opacity-40 hover:opacity-100 transition-opacity" },
                            h('a', { href: "privacy.html", className: "text-[10px] font-bold text-slate-400" }, "隱私權政策 Privacy Policy")
                        )
                    )
                );
            }

            function PrivacyPolicyContent() {
                return h('div', { className: "space-y-8" },
                    h('section', { className: "flex items-start justify-between gap-4" },
                        h('div', { className: "space-y-1" },
                            h('h2', { className: "text-xl font-bold tracking-tight text-slate-900 font-headline" }, "隱私權政策"),
                            h('p', { className: "text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]" }, "Privacy Policy")
                        ),
                        h('div', { className: "w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center" }, 
                            h('i', { 'data-lucide': "shield", className: "w-6 h-6 text-[#006C49]" })
                        )
                    ),
                    h('div', { className: "space-y-6" },
                        h(PolicySection, { title: "關於本政策", content: "本隱私權政策說明本服務在你使用「HO幫手」相關功能時，如何蒐集、處理與利用你的個人資料，以及你可行使的權利。更新日期：2026-04-09" }),
                        h(PolicySection, { title: "蒐集的資料", content: "帳號與識別：LINE 識別碼、顯示名稱、頭像、聯絡資訊等。使用業務資料：群組關係、排班行程、出勤紀錄、薪資設定等。" }),
                        h(PolicySection, { title: "資料安全", content: "我們使用 Firebase 雲端加密儲存，且除非為完成服務、符合法令或經你同意，我們不會任意將你的個人資料提供給無關第三方。" }),
                        h(PolicySection, { title: "聯絡資訊", content: "若你對本政策有疑問，請聯繫 hoho.cs@hohoho.com.tw，我們將於 3-5 個工作日內回覆並協助處理。" })
                    )
                );
            }

            function PolicySection({ title, content }) {
                return h('div', { className: "bg-white/50 p-6 rounded-2xl space-y-2 text-sm" },
                    h('h3', { className: "font-extrabold text-slate-900" }, title),
                    h('p', { className: "text-slate-600 leading-relaxed font-medium" }, content)
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('app'));
            root.render(h(App));
        });
    </script>
</body>
</html>
